name: Build Fuxi Docker Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: "Kernel source branch"
        required: true
        default: "lineage-23.2"
      device:
        description: "Device codename"
        required: true
        default: "fuxi"
      sukisu_ref:
        description: "SukiSU-Ultra ref"
        required: true
        default: "builtin"
      susfs_branch:
        description: "susfs4ksu branch"
        required: true
        default: "gki-android13-5.15"

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      DEVICE: ${{ github.event.inputs.device }}
      KERNEL_BRANCH: ${{ github.event.inputs.kernel_branch }}
      SUKISU_REF: ${{ github.event.inputs.sukisu_ref }}
      SUSFS_BRANCH: ${{ github.event.inputs.susfs_branch }}
      KERNEL_DIR: kernel/xiaomi/sm8550
      KERNEL_DT_DIR: kernel/xiaomi/sm8550-devicetrees
      KERNEL_MODULE_DIR: kernel/xiaomi/sm8550-modules
      OUT_DIR: out
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
    - name: Checkout workflow repo
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex git kmod libelf-dev \
          libssl-dev lz4 pahole patch python3 rsync unzip zip

    - name: Add swap
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Show runner resources
      run: |
        echo "==== uname ===="
        uname -a
        echo "==== cpu ===="
        nproc
        lscpu || true
        echo "==== memory ===="
        free -h
        echo "==== swap ===="
        swapon --show || true
        echo "==== disk ===="
        df -h

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: fuxi-kernel-ccache-${{ github.run_id }}
        restore-keys: |
          fuxi-kernel-ccache-

    - name: Sync kernel sources
      run: |
        mkdir -p kernel/xiaomi
        git clone --depth=1 --branch "${KERNEL_BRANCH}" \
          https://github.com/LineageOS/android_kernel_xiaomi_sm8550 "${KERNEL_DIR}"
        git clone --depth=1 --branch "${KERNEL_BRANCH}" \
          https://github.com/LineageOS/android_kernel_xiaomi_sm8550-devicetrees "${KERNEL_DT_DIR}"
        git clone --depth=1 --branch "${KERNEL_BRANCH}" \
          https://github.com/LineageOS/android_kernel_xiaomi_sm8550-modules "${KERNEL_MODULE_DIR}"

    - name: Integrate SukiSU-Ultra and susfs
      working-directory: ${{ env.KERNEL_DIR }}
      run: |
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "${SUKISU_REF}"
        git clone --depth=1 --branch "${SUSFS_BRANCH}" \
          https://gitlab.com/simonpunk/susfs4ksu.git ../susfs4ksu
        cp ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch KernelSU/
        cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch .
        cp ../susfs4ksu/kernel_patches/fs/* fs/
        cp ../susfs4ksu/kernel_patches/include/linux/* include/linux/
        cd KernelSU
        patch -p1 < 10_enable_susfs_for_ksu.patch
        cd ..
        patch -p1 < 50_add_susfs_in_gki-android13-5.15.patch
        rm -f android/abi_gki_protected_exports_aarch64 android/abi_gki_protected_exports_x86_64

    - name: Install clang toolchain
      run: |
        mkdir -p clang
        cd clang
        curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz | tar xz

    - name: Generate merged config
      working-directory: ${{ env.KERNEL_DIR }}
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export LLVM=1
        export LLVM_IAS=1
        export PATH="${GITHUB_WORKSPACE}/clang/bin:${PATH}"
        mkdir -p "${GITHUB_WORKSPACE}/${OUT_DIR}"
        make O="${GITHUB_WORKSPACE}/${OUT_DIR}" gki_defconfig
        ./scripts/kconfig/merge_config.sh -m -O "${GITHUB_WORKSPACE}/${OUT_DIR}" \
          "${GITHUB_WORKSPACE}/${OUT_DIR}/.config" \
          arch/arm64/configs/vendor/kalama_GKI.config \
          arch/arm64/configs/vendor/${DEVICE}_GKI.config \
          "${GITHUB_WORKSPACE}/fuxi-docker.fragment"
        make O="${GITHUB_WORKSPACE}/${OUT_DIR}" olddefconfig
        grep -E 'CONFIG_(KSU|KSU_SUSFS|PID_NS|IPC_NS|USER_NS|CGROUP_PIDS|CGROUP_DEVICE|NETFILTER_XT_MATCH_ADDRTYPE|BRIDGE_NETFILTER)=' \
          "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"

    - name: Build kernel image
      working-directory: ${{ env.KERNEL_DIR }}
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export LLVM=1
        export LLVM_IAS=1
        export PATH="${GITHUB_WORKSPACE}/clang/bin:${PATH}"
        export CC="ccache clang"
        export CXX="ccache clang++"
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export STRIP=llvm-strip
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        make -j4 O="${GITHUB_WORKSPACE}/${OUT_DIR}" Image modules

    - name: Collect artifacts
      run: |
        mkdir -p artifacts
        cp "${OUT_DIR}/arch/arm64/boot/Image" artifacts/Image
        cp "${OUT_DIR}/.config" artifacts/kernel.config
        find "${OUT_DIR}" -name '*.ko' -exec cp --parents {} artifacts/ \;

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fuxi-docker-kernel
        path: artifacts
