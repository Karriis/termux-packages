name: Build Fuxi Docker Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_ref:
        description: "Official LOS 23.2 kernel commit from the running 20260316 boot"
        required: true
        default: "f508f9efd558751844624c934327f439f4e562cb"
      device:
        description: "Device codename"
        required: true
        default: "fuxi"
      clang_archive_url:
        description: "Pinned public clang-r563880c archive matching the running official boot string"
        required: true
        default: "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/edcb2a6ac86b51212d8acc6b72947e5f8cd23d35/clang-r563880c.tar.gz"
      build_user:
        description: "Kernel build user string for linux_banner"
        required: true
        default: "root"
      build_host:
        description: "Kernel build host string for linux_banner"
        required: true
        default: "probe-fuxi"
      build_timestamp:
        description: "Kernel build timestamp string for linux_banner"
        required: true
        default: "Sun Mar 23 13:50:00 UTC 2026"

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      DEVICE: ${{ github.event.inputs.device }}
      KERNEL_REF: ${{ github.event.inputs.kernel_ref }}
      CLANG_ARCHIVE_URL: ${{ github.event.inputs.clang_archive_url }}
      BUILD_USER: ${{ github.event.inputs.build_user }}
      BUILD_HOST: ${{ github.event.inputs.build_host }}
      BUILD_TIMESTAMP: ${{ github.event.inputs.build_timestamp }}
      KERNEL_DIR: kernel/xiaomi/sm8550
      OUT_BASELINE_DIR: out-baseline
      OUT_DIR: out
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      EXPECTED_RELEASE_STRING: "Linux version 5.15.200-gf508f9efd558"
      EXPECTED_CLANG_STRING: "Android (14054515, +pgo, +bolt, +lto, +mlgo, based on r563880c) clang version 21.0.0"

    steps:
    - name: Checkout workflow repo
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex git kmod libelf-dev \
          libssl-dev lz4 pahole patch python3 rsync unzip xz-utils zip

    - name: Add swap
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Show runner resources
      run: |
        echo "==== uname ===="
        uname -a
        echo "==== cpu ===="
        nproc
        lscpu || true
        echo "==== memory ===="
        free -h
        echo "==== swap ===="
        swapon --show || true
        echo "==== disk ===="
        df -h

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: fuxi-los23.2-docker-ccache-${{ github.run_id }}
        restore-keys: |
          fuxi-los23.2-docker-ccache-

    - name: Verify public device config entry points
      run: |
        git clone --depth=1 --branch lineage-23.2 \
          https://github.com/LineageOS/android_device_xiaomi_sm8550-common.git device/xiaomi/sm8550-common
        grep -F 'TARGET_KERNEL_SOURCE := kernel/xiaomi/sm8550' \
          device/xiaomi/sm8550-common/BoardConfigCommon.mk
        grep -F 'gki_defconfig' device/xiaomi/sm8550-common/BoardConfigCommon.mk
        grep -F 'vendor/kalama_GKI.config' device/xiaomi/sm8550-common/BoardConfigCommon.mk
        grep -F 'vendor/$(PRODUCT_DEVICE)_GKI.config' \
          device/xiaomi/sm8550-common/BoardConfigCommon.mk

    - name: Sync official LOS 23.2 kernel source
      run: |
        mkdir -p kernel/xiaomi
        git clone --filter=blob:none --single-branch --branch lineage-23.2 \
          https://github.com/LineageOS/android_kernel_xiaomi_sm8550.git "${KERNEL_DIR}"
        git -C "${KERNEL_DIR}" fetch --depth=1 origin "${KERNEL_REF}"
        git -C "${KERNEL_DIR}" checkout --detach FETCH_HEAD
        git -C "${KERNEL_DIR}" rev-parse HEAD
        git -C "${KERNEL_DIR}" show -s --date=iso --format='%H%n%ad%n%s'
        git -C "${KERNEL_DIR}" show HEAD:Makefile | grep -E '^VERSION =|^PATCHLEVEL =|^SUBLEVEL =|^EXTRAVERSION ='
        test -f "${KERNEL_DIR}/arch/arm64/configs/gki_defconfig"
        test -f "${KERNEL_DIR}/arch/arm64/configs/vendor/kalama_GKI.config"
        test -f "${KERNEL_DIR}/arch/arm64/configs/vendor/${DEVICE}_GKI.config"

    - name: Install evidenced clang-r563880c toolchain
      run: |
        mkdir -p clang
        cd clang
        curl -L "${CLANG_ARCHIVE_URL}" | tar xz
        test -f AndroidVersion.txt
        grep -Fx '21.0.0' AndroidVersion.txt
        grep -Fx 'based on r563880c' AndroidVersion.txt
        ./bin/clang --version | head -n 1
        ./bin/clang --version | grep -F 'clang version 21.0.0'

    - name: Generate official baseline config
      working-directory: ${{ env.KERNEL_DIR }}
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export LLVM=1
        export LLVM_IAS=1
        export PATH="${GITHUB_WORKSPACE}/clang/bin:${PATH}"
        mkdir -p "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}"
        ./scripts/kconfig/merge_config.sh -m -O "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}" \
          arch/arm64/configs/gki_defconfig \
          arch/arm64/configs/vendor/kalama_GKI.config \
          arch/arm64/configs/vendor/${DEVICE}_GKI.config
        make O="${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}" olddefconfig
        grep -q '^CONFIG_LOCALVERSION=""' "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config"
        grep -q '^CONFIG_LOCALVERSION_AUTO=y' "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config"
        grep -q '^# CONFIG_SYSVIPC is not set' "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config"
        grep -q '^# CONFIG_PID_NS is not set' "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config"
        grep -q '^# CONFIG_USER_NS is not set' "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config"
        grep -q '^# CONFIG_CGROUP_PIDS is not set' "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config"
        grep -q '^# CONFIG_CGROUP_DEVICE is not set' "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config"
        grep -q '^# CONFIG_BRIDGE_NETFILTER is not set' "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config"
        grep -q '^# CONFIG_NETFILTER_XT_MATCH_ADDRTYPE is not set' "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config"
        ! grep -q '^CONFIG_KSU=' "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config"
        ! grep -q '^CONFIG_KSU_SUSFS=' "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config"

    - name: Merge Docker fragment on top of official baseline
      working-directory: ${{ env.KERNEL_DIR }}
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export LLVM=1
        export LLVM_IAS=1
        export PATH="${GITHUB_WORKSPACE}/clang/bin:${PATH}"
        mkdir -p "${GITHUB_WORKSPACE}/${OUT_DIR}"
        cp "${GITHUB_WORKSPACE}/${OUT_BASELINE_DIR}/.config" "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        ./scripts/kconfig/merge_config.sh -m -O "${GITHUB_WORKSPACE}/${OUT_DIR}" \
          "${GITHUB_WORKSPACE}/${OUT_DIR}/.config" \
          "${GITHUB_WORKSPACE}/fuxi-docker.fragment"
        make O="${GITHUB_WORKSPACE}/${OUT_DIR}" olddefconfig
        grep -q '^CONFIG_LOCALVERSION=""' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        grep -q '^CONFIG_LOCALVERSION_AUTO=y' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        grep -q '^CONFIG_SYSVIPC=y' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        grep -q '^CONFIG_POSIX_MQUEUE=y' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        grep -q '^CONFIG_PID_NS=y' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        grep -q '^CONFIG_IPC_NS=y' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        grep -q '^CONFIG_USER_NS=y' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        grep -q '^CONFIG_CGROUP_PIDS=y' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        grep -q '^CONFIG_CGROUP_DEVICE=y' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        grep -q '^CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        grep -q '^CONFIG_BRIDGE_NETFILTER=y' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        ! grep -q '^CONFIG_KSU=' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"
        ! grep -q '^CONFIG_KSU_SUSFS=' "${GITHUB_WORKSPACE}/${OUT_DIR}/.config"

    - name: Build kernel image
      working-directory: ${{ env.KERNEL_DIR }}
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export LLVM=1
        export LLVM_IAS=1
        export PATH="${GITHUB_WORKSPACE}/clang/bin:${PATH}"
        export CC="ccache clang"
        export CXX="ccache clang++"
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export STRIP=llvm-strip
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export KBUILD_BUILD_USER="${BUILD_USER}"
        export KBUILD_BUILD_HOST="${BUILD_HOST}"
        export KBUILD_BUILD_TIMESTAMP="${BUILD_TIMESTAMP}"
        make -j4 O="${GITHUB_WORKSPACE}/${OUT_DIR}" Image modules

    - name: Verify built kernel release string
      run: |
        strings "${OUT_DIR}/arch/arm64/boot/Image" | grep -a "Linux version" | head -n 1
        strings "${OUT_DIR}/arch/arm64/boot/Image" | grep -a -q "${EXPECTED_RELEASE_STRING}"
        strings "${OUT_DIR}/arch/arm64/boot/Image" | grep -a -q "(${BUILD_USER}@${BUILD_HOST})"
        strings "${OUT_DIR}/arch/arm64/boot/Image" | grep -a -q "${EXPECTED_CLANG_STRING}"
        strings "${OUT_DIR}/arch/arm64/boot/Image" | grep -a -q "${BUILD_TIMESTAMP}"

    - name: Collect artifacts
      run: |
        mkdir -p artifacts
        {
          echo "kernel_ref=${KERNEL_REF}"
          echo "device=${DEVICE}"
          echo "clang_archive_url=${CLANG_ARCHIVE_URL}"
          echo "build_user=${BUILD_USER}"
          echo "build_host=${BUILD_HOST}"
          echo "build_timestamp=${BUILD_TIMESTAMP}"
          echo "expected_release_string=${EXPECTED_RELEASE_STRING}"
          echo "expected_clang_string=${EXPECTED_CLANG_STRING}"
        } > artifacts/evidence.txt
        cp "${OUT_BASELINE_DIR}/.config" artifacts/official-baseline.config
        cp "${OUT_DIR}/arch/arm64/boot/Image" artifacts/Image
        cp "${OUT_DIR}/.config" artifacts/kernel.config
        find "${OUT_DIR}" -name '*.ko' -exec cp --parents {} artifacts/ \;

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fuxi-docker-kernel-los23.2
        path: artifacts
